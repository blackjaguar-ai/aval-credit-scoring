# ──────────────────────────────────────────────────────────────
# AVAL — docker-compose.yml
# Orquesta API (FastAPI) + Dashboard (Streamlit)
# Uso: docker-compose up -d
# ──────────────────────────────────────────────────────────────

version: "3.9"

services:
  aval-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: aval-credit-scoring:latest
    container_name: aval-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs       # Logs de auditoría persistentes fuera del contenedor
      - ./models:/app/models   # Artefactos del modelo (read-only en producción)
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  aval-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard  # Imagen separada para Streamlit
    image: aval-dashboard:latest
    container_name: aval-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://aval-api:8000
    env_file:
      - .env
    depends_on:
      aval-api:
        condition: service_healthy

networks:
  default:
    name: aval-network